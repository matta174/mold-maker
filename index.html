<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      CSP: local app, no remote script sources. 'unsafe-eval' is required because
      manifold-3d compiles WebAssembly at runtime. 'unsafe-inline' on styles
      because the renderer uses inline style objects. Revisit if we add CSS-in-JS
      with nonce support or move Manifold into a Worker.

      %TELEMETRY_CONNECT_SRC% is replaced at build time by the Vite plugin in
      vite.renderer.config.ts. If VITE_TELEMETRY_HOST is unset, the placeholder
      becomes an empty string and connect-src stays 'self' blob:, so a build
      with no telemetry host literally cannot phone home — regardless of
      app-level settings. Belt-and-braces against future bugs (or supply-chain
      compromise) silently re-enabling telemetry.
    -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-eval' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' blob: %TELEMETRY_CONNECT_SRC%; worker-src 'self' blob:; object-src 'none'; base-uri 'self';" />
    <title>Mold Maker — open-source two-part mold generator for 3D printing</title>
    <meta name="description" content="Load an STL or OBJ, pick a parting plane, export print-ready mold halves with auto-generated sprues, vents, and registration pins. Offline-first, no signup, no cloud upload." />

    <!--
      Favicons + app icons. favicon.ico is the legacy multi-res bundle (16..256)
      for older browsers. logo.svg is the scalable version modern browsers
      prefer. apple-touch-icon.png is the home-screen icon iOS Safari picks up
      when someone "Add to Home Screen"s the PWA-style deploy.
    -->
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" sizes="any" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!--
      Open Graph + Twitter Card tags for link unfurling on HN, Reddit, Slack, etc.
      og-image.png is 1280x640 — GitHub, X, Slack, and LinkedIn all handle that
      size without cropping. (The canonical OG minimum is 1200x630; going wider
      hurts nothing.)
    -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Mold Maker — open-source two-part mold generator for 3D printing" />
    <meta property="og:description" content="Load an STL or OBJ, pick a parting plane, export print-ready mold halves with auto-generated sprues, vents, and registration pins. Offline-first, no signup." />
    <meta property="og:url" content="https://matta174.github.io/mold-maker/" />
    <meta property="og:image" content="https://matta174.github.io/mold-maker/og-image.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Mold Maker — open-source two-part mold generator" />
    <meta name="twitter:description" content="Turn 3D models into print-ready mold halves with auto-generated sprues, vents, and registration pins. Runs in your browser, offline." />
    <meta name="twitter:image" content="https://matta174.github.io/mold-maker/og-image.png" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body, #root { width: 100%; height: 100%; overflow: hidden; }
      body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a2e; color: #e0e0e0; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/renderer/main.tsx"></script>
  </body>
</html>
