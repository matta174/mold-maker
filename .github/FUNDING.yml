# Enables the "Sponsor" button in the repo header. GitHub reads this file
# on push and surfaces the declared platforms. Supported keys include
# `github`, `patreon`, `open_collective`, `ko_fi`, `tidelift`, `community_bridge`,
# `liberapay`, `issuehunt`, `lfx_crowdfunding`, `polar`, `buy_me_a_coffee`,
# and a generic `custom` list for arbitrary URLs.
#
# See https://docs.github.com/en/repositories/managing-your-repositorys-settings-and-features/customizing-your-repository/displaying-a-sponsor-button-in-your-repository

github: matta174
